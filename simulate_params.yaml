# VROOMM detector simulation parameters
# ----------------------------------------
# Run:  python simulate_detector.py
# All paths are relative to the project root (where this file lives).
# Output image is in detected photons per pixel.

# ── observatory ──────────────────────────────────────────────────────────────
# Observatoire du Mont-Mégantic (OMM), Québec, Canada.
observatory:
  name:         OMM
  lat_deg:      45.4554     # geodetic latitude  [deg N]
  lon_deg:      -71.1527    # geodetic longitude [deg E; negative = West]
  elevation_m:  1111.0      # altitude above sea level [m]

# ── telescope ────────────────────────────────────────────────────────────────
# OMM 1.6 m Ritchey-Chrétien primary.
# peak_throughput: total system efficiency (optics + grating + detector QE)
#   at the blaze peak.  10 % is a conservative but realistic estimate.
telescope:
  name:            OMM-1.6m
  diameter_m:      1.6      # primary mirror diameter [m]
  peak_throughput: 0.10     # fraction of photons reaching detector at blaze peak

# ── observation ──────────────────────────────────────────────────────────────
# JD_UTC is the Julian Date (UTC scale) of the midpoint of the exposure.
# 2024-10-17T04:00:00 UTC = midnight EDT at OMM = the night Tau Ceti transits
# at midnight (Sun at RA ≈ 13h 44m, opposite to Tau Ceti at RA = 1h 44m).
observation:
  jd_utc:     2460600.667   # 2024-10-17 04:00 UTC  (midnight EDT at OMM)
  exposure_s: 1800.0        # exposure time [s]
  default_science_exp_s: 900.0

# ── default exposure presets (planner + calibration templates) ─────────────
calibration_defaults:
  FLAT:    30.0
  THAR:    30.0
  UNE:     60.0
  FP:      30.0
  DARK:    300.0
  BIAS:    0.1
  SCIENCE: 900.0

# ── science target ────────────────────────────────────────────────────────────
# Tau Ceti (HD 10700): nearby K-dwarf, archetypical RV standard, V=3.5, R≈3.3.
# Proper motion and parallax taken from Hipparcos/Gaia.
# rv_sys_kms: systemic (barycentric) radial velocity; positive = receding.
# BERV is computed on-the-fly by barycorrpy using jd_utc + observatory coords.
# The relativistic Doppler shift is applied before telluric multiplication.
target:
  name:         "Tau Ceti"
  ra_deg:       26.017008   # J2000 right ascension [deg]  (01h 44m 04.08s)
  dec_deg:      -15.937478  # J2000 declination     [deg]  (-15° 56′ 14.9″)
  pmra_masyr:   -1721.05    # proper motion µ_α·cos δ [mas/yr]
  pmdec_masyr:  854.16      # proper motion µ_δ       [mas/yr]
  px_mas:       273.96      # parallax                [mas]
  rv_sys_kms:   -16.40      # systemic RV (barycentric frame) [km/s]

# ── star ─────────────────────────────────────────────────────────────────────
star:
  R_mag: 3.3                # Cousins R magnitude of the target (Tau Ceti ≈ 3.3)
  vsini_kms: 200.0          # projected rotation velocity [km/s] (0 = no broadening)

# ── input data ──────────────────────────────────────────────────────────────
psf_dir:   assets/zemax_data/images_fibre_rectangulaire   # PSF file directory
xy_table:  assets/zemax_data/VROOMM_V04_XY.txt            # order/wavelength/position table

# ── output ──────────────────────────────────────────────────────────────────
output_fits: detector_sim.fits
output_png:  detector_sim.png

# ── wavelength sampling ──────────────────────────────────────────────────────
# Preferred control: sampling step as a fraction of detector pixel along trace.
# Internal nm step is estimated from the XY table's typical local dispersion.
# Smaller value = finer sampling = longer runtime.
wave_step_pix_frac: 2   # 0.25 px is a good default (accurate, moderate runtime)

# ── blaze envelope ───────────────────────────────────────────────────────────
# Multiplies each order by sinc²(π·(λ − λ_c) / Δλ_FSR)
# λ_c  = central (middle) reference wavelength of the order
# Δλ_FSR = λ_c / order_number  (free spectral range)
blaze: true

# ── input spectrum ───────────────────────────────────────────────────────────
# Set spectrum_mode to one of:
#   synthetic  – flat continuum + Gaussian emission lines (see below)
#   file       – load a two-column ASCII/CSV file (wave_nm, flux)
#   model      – download nearest BT-Settl CIFIST grid point from SVO
spectrum_mode: model

# Settings used when spectrum_mode = synthetic
synthetic:
  continuum:        1.0
  line_spacing_nm:  1.0
  line_fwhm_nm:     0.001

# Settings used when spectrum_mode = file
# Two-column ASCII: wavelength [nm], flux [arbitrary]
spectrum_file:
  path:        my_spectrum.dat
  wave_col:    0
  flux_col:    1

# Settings used when spectrum_mode = model
# Downloads the nearest BT-Settl CIFIST grid point from the SVO and caches it.
model:
  teff:      12000          # test case: hot A-type star
  logg:      4.0            # log surface gravity  [log(cm/s²)]
  cache_dir: assets/spectral_models

# ── sky emission ─────────────────────────────────────────────────────────────
# OH Meinel airglow (ExoMol MoLLIST-OH, Boltzmann-weighted at T=200 K)
# plus O I 5577/6300/6364/7774/8446 and Na I D doublet.
sky:
  enabled:     true
  R_mag:       19.0         # sky R-band surface brightness through the fiber [mag]
  scale:       1.0          # fine-tune multiplier (1.0 = exact absolute calibration)
  v_fwhm_kms:  1.0          # OH line velocity FWHM [km/s] (thermal + turbulent)
  cache_dir:   assets/spectral_models

# ── telluric absorption ────────────────────────────────────────────────────────
# Per-species TAPAS transmission FITS (H2O, CO2, CH4, O2, O3, N2O, NO2).
# Dry absorbers scaled as T^airmass; water scaled as T_H2O^water_od.
# water_od = airmass × (PWV / PWV_ref); useful range 0.5 (dry) – 5 (very wet).
telluric:
  enabled:    true
  fits_path:  assets/LaSilla_tapas.fits
  airmass:    1.2           # airmass of observation (scales dry absorbers)
  water_od:   1.5           # H2O optical depth scaling factor (0.5–5)
  cache_dir:  assets/spectral_models

# ── Octagonal fiber (sky reference) ──────────────────────────────────────────
# Receives sky only; same total throughput as rectangular fiber; offset below.
octagonal_fiber:
  enabled:      true
  psf_dir:      assets/zemax_data/images_fibre_octogonale
  y_offset_pix: -12         # 12 pixels below rectangular fiber
  sky_scale:    1.0         # same absolute sky normalisation as rectangular fiber

# ── flat-field (blackbody lamp) ───────────────────────────────────────────────
# When enabled, selected fiber(s) receive a calibrated blackbody spectrum.
# No vsini, Doppler, telluric, or OH sky applied to that fiber.
flatfield:
  enabled:    false
  rect_fiber: true          # flat in rectangular fiber
  oct_fiber:  true          # flat in octagonal fiber
  tbb_K:      5000.0        # blackbody temperature [K]
  R_mag:      10.0          # brightness (Cousins R mag equivalent)

# ── arc lamp ─────────────────────────────────────────────────────────────────
# Lines fetched from NIST ASD (air wavelengths converted to vacuum) and cached.
# No vsini, Doppler, telluric, or OH sky applied to that fiber.
lamp:
  enabled:     false
  rect_fiber:  false        # arc in rectangular fiber
  oct_fiber:   false        # arc in octagonal fiber
  type:        thar         # 'thar' | 'une' | 'fp'
  R_mag:       10.0         # brightness (Cousins R mag equivalent)
  v_fwhm_kms:  0.3          # line broadening FWHM [km/s] (thermal + instrumental)
  fp_cavity_cm: 1.0         # FP cavity length [cm]
  fp_finesse:   10.0        # FP finesse (dimensionless)
  fp_tbb_K:     5000.0      # blackbody envelope temperature [K] for FP mode
  cache_dir:   assets/spectral_models


